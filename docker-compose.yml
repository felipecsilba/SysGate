version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sysgate-backend
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: 'file:./dev.db'
      PORT: '3001'
    volumes:
      - backend-db:/app/prisma
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sysgate-frontend
    ports:
      - '3000:3000'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-db:
